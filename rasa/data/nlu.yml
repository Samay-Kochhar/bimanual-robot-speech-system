version: "3.1"
nlu:

# --- GREET ---
- intent: greet
  examples: |
    - hello
    - hi
    - hey robot
    - good morning
    - hey there

# --- AFFIRM ---
- intent: affirm
  examples: |
    - yes
    - yeah
    - sure
    - correct
    - that's right

# --- DENY ---
- intent: deny
  examples: |
    - no
    - nope
    - not really
    - don't do that

# --- STOP ---
- intent: stop
  examples: |
    - stop
    - halt
    - abort
    - cancel that
    - wait stop
    - stop the task

# --- PUT (put object somewhere) ---
- intent: put
  examples: |
    - put [the](quantifier) [red](color) [apple](object) [in](relation) [the](quantifier) [blue](color) [bowl](object)
    - put [one](quantifier) [green](color) [block](object) [on](relation) [the](quantifier) [table](object)
    - put [this](quantifier) [object](object) [in](relation) [the](quantifier) [box](object)
    - put [that](quantifier) [object](object) [on](relation) [the](quantifier) [table](object)
    - put [a](quantifier) [small](size) [red](color) [apple](object) [in](relation) [the](quantifier) [big](size) [bowl](object)
    - put [the](quantifier) [long](elongated) [blue](color) [tube](object) [on top of](relation) [the](quantifier) [platform](object)
    - put [the](quantifier) [short](elongated) [cylinder](object) [behind](relation) [the](quantifier) [box](object)
    - put [the](quantifier) [left](xpos) [block](object) [to the right of](relation) [the](quantifier) [cube](object)
    - put [the](quantifier) [front](ypos) [apple](object) [in front of](relation) [the](quantifier) [bowl](object)
    - place [any](quantifier) [green](color) [block](object) [left of](relation) [the](quantifier) [table](object)
    - place [all](quantifier) [blue](color) [blocks](object) [right of](relation) [the](quantifier) [box](object)

# --- GIVE (give object to me) ---
- intent: give
  examples: |
    - give me [the](quantifier) [red](color) [apple](object)
    - give [one](quantifier) [blue](color) [block](object)
    - hand me [the](quantifier) [green](color) [cylinder](object)
    - pass me [a](quantifier) [small](size) [blue](color) [cube](object)
    - give me [that](quantifier) [long](elongated) [tube](object)
    - give me [this](quantifier) [object](object)
    - give me [the](quantifier) [left](xpos) [apple](object)
    - give [any](quantifier) [short](elongated) [block](object)

# --- DESCRIBE OBJECT (object properties in scene) ---
- intent: describe_object
  examples: |
    - [the](quantifier) [red](color) [block](object)
    - [the](quantifier) [green](color) [cube](object)
    - [the](quantifier) [long](elongated) [blue](color) [tube](object)
    - [a](quantifier) [small](size) [red](color) [apple](object)
    - [the](quantifier) [big](size) [green](color) [box](object)
    - [any](quantifier) [red](color) [object](object)
    - [an](quantifier) [elongated](elongated) [tube](object)
    - [the](quantifier) [left](xpos) [front](ypos) [block](object)
    - [the](quantifier) [right](xpos) [back](ypos) [object](object)

